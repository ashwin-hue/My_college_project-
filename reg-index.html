<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="reg-styles.css">
</head>
<body>
    <div class="registration-container">
        <h1>Patient Registration</h1>
        <form id="registrationForm">
            <div class="form-group">
                <label for="id">ID:</label>
                <input type="text" id="id" name="id" required>
            </div>
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="plan">Plan:</label>
                <select id="plan" name="plan" required>
                    <option value="">Select a plan</option>
                    <option value=" Student Health & Wellness Plan">Student Health & Wellness Plan</option>
                    <option value=" Family Health & Wellness Plan">Family Health & Wellness Plan</option>
                </select>
            </div>
            <div class="form-group">
                <label for="valid_date">Valid Date:</label>
                <input type="date" id="valid_date" name="valid_date" required>
            </div>
             
            <button type="submit" class="submit-btn">Register</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script src="reg-script.js"></script>
</body>
</html>
